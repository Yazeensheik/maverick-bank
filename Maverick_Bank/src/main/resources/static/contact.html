<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact • Maverick Banking System</title>
  <link rel="icon" href="/assets/img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
<div id="loader" class="loader-overlay"><div class="spinner-border text-light" role="status"></div></div>
<div id="navbar-root"></div>
<section class="py-5">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="page-hero hero-overlay text-white p-4 p-lg-5 h-100" style="background-image:url('/assets/img/contact-bg.png')">
          <div class="mt-auto"><p class="text-uppercase fw-bold mb-2">Contact & Support</p><h1 class="display-6 fw-bold">Professional assistance for digital banking operations</h1><p class="text-white-50 mt-3 mb-0">A clean contact page you can later connect to your own mail or CRM service.</p></div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card-soft p-4 p-lg-5">
          <h2 class="section-title mb-3">Send an enquiry</h2>
          <div id="contactAlert"></div>
          <form id="contactForm" class="row g-3">
            <div class="col-md-6"><input class="form-control" placeholder="Full Name" required></div>
            <div class="col-md-6"><input class="form-control" placeholder="Email Address" required></div>
            <div class="col-12"><input class="form-control" placeholder="Subject" required></div>
            <div class="col-12"><textarea class="form-control" rows="5" placeholder="Your message" required></textarea></div>
            <div class="col-12"><button class="btn btn-gradient rounded-pill px-4" type="submit">Send Message</button></div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
<div id="footer-root"></div>
<script>
document.addEventListener("DOMContentLoaded",()=>{
  UI.loadLayout({navbar:true,footer:true});
  document.getElementById("contactForm").addEventListener("submit",(e)=>{e.preventDefault();UI.showAlert("contactAlert","Message captured successfully on the frontend.","success");e.target.reset();});
});
</script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/ui.js"></script>
</body>
</html>

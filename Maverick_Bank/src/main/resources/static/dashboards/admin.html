<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>
  <link rel="icon" href="/assets/img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
<div id="loader" class="loader-overlay"><div class="spinner-border text-light" role="status"></div></div>
<div class="dashboard-shell"><div class="row g-0"><div class="col-lg-3 col-xl-2" id="sidebar-root"></div><div class="col-lg-9 col-xl-10 dashboard-main"><div class="p-3 p-lg-4">
  <div id="pageAlert"></div>
  <div class="card-soft p-4 mb-4"><div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3"><div><span class="badge badge-soft px-3 py-2 mb-2">ADMIN Console</span><h1 class="section-title mb-1">Admin Dashboard</h1><p class="text-muted-2 mb-0">Manage users and review core banking master data from one professional dashboard.</p></div><div class="small-note">Logged in as <b id="topRoleLabel"></b></div></div></div>
  <div class="row g-4 mb-4">
    <div class="col-md-3"><div class="kpi p-4"><div class="small-note">Users</div><div class="metric-value" id="adminUsersCount">—</div></div></div>
    <div class="col-md-3"><div class="kpi p-4"><div class="small-note">Customers</div><div class="metric-value" id="adminCustomerCount">—</div></div></div>
    <div class="col-md-3"><div class="kpi p-4"><div class="small-note">Employees</div><div class="metric-value" id="adminEmployeeCount">—</div></div></div>
    <div class="col-md-3"><div class="kpi p-4"><div class="small-note">Loan Types</div><div class="metric-value" id="adminLoanCount">—</div></div></div>
  </div>
  <div class="row g-4">
    <div class="col-xl-6"><div class="card-soft p-4 h-100"><h4 class="fw-bold mb-3">Create user</h4><div id="adminCreateAlert"></div><form id="adminCreateForm" class="row g-3"><div class="col-md-4"><select class="form-select" id="adminUserType"><option value="CUSTOMER">Customer</option><option value="EMPLOYEE">Employee</option></select></div><div class="col-md-4"><input class="form-control" id="adminEmail" placeholder="Email" required></div><div class="col-md-4"><input class="form-control" id="adminPassword" type="password" placeholder="Password" required></div><div class="col-12"><button class="btn btn-gradient rounded-pill" type="submit">Create User</button></div></form></div></div>
    <div class="col-xl-6"><div class="card-soft p-4 h-100"><div class="d-flex justify-content-between align-items-center mb-3"><h4 class="fw-bold mb-0">Recent users</h4><button class="btn btn-outline-primary rounded-pill" id="refreshAdminBtn">Refresh</button></div><div class="table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>Email</th><th>Role</th></tr></thead><tbody id="adminUsersTable"><tr><td colspan="3" class="text-center text-muted py-4">No data loaded</td></tr></tbody></table></div></div></div>
  </div>
</div></div></div></div>
<script>
document.addEventListener("DOMContentLoaded",()=>{
  UI.loadLayout({sidebar:true}); UI.protectRoute(["ADMIN"]);
  async function loadData(){ UI.showLoader(); try{ const [users,customers,employees,loans]=await Promise.all([AdminApi.users(),AdminApi.customerProfiles(),AdminApi.employeeProfiles(),AdminApi.loans()]); UI.fillText("adminUsersCount",users.length); UI.fillText("adminCustomerCount",customers.length); UI.fillText("adminEmployeeCount",employees.length); UI.fillText("adminLoanCount",loans.length); document.getElementById("adminUsersTable").innerHTML=users.slice(0,8).map(u=>`<tr><td>${u.id||u.userId||"—"}</td><td>${u.email||u.username||"—"}</td><td>${u.role?.name||u.role||"—"}</td></tr>`).join("") || `<tr><td colspan="3" class="text-center text-muted py-4">No data found</td></tr>`; } catch(error){ UI.showAlert("pageAlert",error.message,"danger"); } finally{ UI.hideLoader(); } }
  document.getElementById("refreshAdminBtn").addEventListener("click",loadData);
  document.getElementById("adminCreateForm").addEventListener("submit",async(e)=>{ e.preventDefault(); UI.clearAlert("adminCreateAlert"); const type=adminUserType.value; const email=adminEmail.value.trim(); const password=adminPassword.value; if(!Validators.email(email)){ UI.showAlert("adminCreateAlert","Enter a valid email address.","warning"); return; } if(!Validators.password(password)){ UI.showAlert("adminCreateAlert","Password must have uppercase, lowercase and a number, with at least 6 characters.","warning"); return; } UI.showLoader(); try{ const payload={email,password}; if(type==="EMPLOYEE") await AdminApi.createEmployeeUser(payload); else await AdminApi.createCustomerUser(payload); UI.showAlert("adminCreateAlert","User created successfully.","success"); e.target.reset(); loadData(); } catch(error){ UI.showAlert("adminCreateAlert",error.message,"danger"); } finally{ UI.hideLoader(); }});
  loadData();
});
</script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/session.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/ui.js"></script>
<script src="/assets/js/validators.js"></script>
<script src="/assets/js/admin.js"></script>
</body>
</html>

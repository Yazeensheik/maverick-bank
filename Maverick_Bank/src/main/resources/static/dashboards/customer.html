<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customer Dashboard</title>
  <link rel="icon" href="/assets/img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
<div id="loader" class="loader-overlay"><div class="spinner-border text-light" role="status"></div></div>
<div class="dashboard-shell"><div class="row g-0"><div class="col-lg-3 col-xl-2" id="sidebar-root"></div><div class="col-lg-9 col-xl-10 dashboard-main"><div class="p-3 p-lg-4">
  <div id="pageAlert"></div>
  <div class="card-soft p-4 mb-4"><div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3"><div><span class="badge badge-soft px-3 py-2 mb-2">CUSTOMER Console</span><h1 class="section-title mb-1">Customer Dashboard</h1><p class="text-muted-2 mb-0">Load accounts using your saved customer profile ID and manage quick actions.</p></div><div class="small-note">Logged in as <b id="topRoleLabel"></b></div></div></div>
  <div class="row g-4 mb-4">
    <div class="col-md-4"><div class="kpi p-4"><div class="small-note">Saved User ID</div><div class="metric-value" id="custUserValue">—</div></div></div>
    <div class="col-md-4"><div class="kpi p-4"><div class="small-note">Customer Profile ID</div><div class="metric-value" id="custProfileValue">—</div></div></div>
    <div class="col-md-4"><div class="kpi p-4"><div class="small-note">Primary Account ID</div><div class="metric-value" id="custAccountValue">—</div></div></div>
  </div>
  <div class="row g-4">
    <div class="col-xl-5"><div class="card-soft p-4 h-100"><h4 class="fw-bold mb-3">Session setup</h4><div id="idAlert"></div><form id="idsForm" class="row g-3"><div class="col-12"><label class="form-label">User ID</label><input class="form-control" id="userId"></div><div class="col-12"><label class="form-label">Customer Profile ID</label><input class="form-control" id="customerProfileId"></div><div class="col-12"><label class="form-label">Primary Account ID</label><input class="form-control" id="primaryAccountId"></div><div class="col-12"><button class="btn btn-gradient rounded-pill w-100" type="submit">Save IDs</button></div></form></div></div>
    <div class="col-xl-7"><div class="card-soft p-4 h-100"><div class="d-flex justify-content-between align-items-center mb-3"><h4 class="fw-bold mb-0">Account preview</h4><button class="btn btn-outline-primary rounded-pill" id="loadAccountsBtn">Load Accounts</button></div><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Account No</th><th>Type</th><th>Balance</th><th>Status</th></tr></thead><tbody id="accountsTableBody"><tr><td colspan="4" class="text-center text-muted py-4">No account data loaded yet</td></tr></tbody></table></div></div></div>
  </div>
</div></div></div></div>
<script>
document.addEventListener("DOMContentLoaded",()=>{
  UI.loadLayout({sidebar:true});
  UI.protectRoute(["CUSTOMER"]);
  const ids=AppSession.getIds();
  document.getElementById("userId").value=ids.userId||"";
  document.getElementById("customerProfileId").value=ids.customerProfileId||"";
  document.getElementById("primaryAccountId").value=ids.primaryAccountId||"";
  UI.fillText("custUserValue",ids.userId||"Not set"); UI.fillText("custProfileValue",ids.customerProfileId||"Not set"); UI.fillText("custAccountValue",ids.primaryAccountId||"Not set");
  document.getElementById("idsForm").addEventListener("submit",(e)=>{e.preventDefault(); AppSession.setIds({userId:userId.value,customerProfileId:customerProfileId.value,primaryAccountId:primaryAccountId.value}); UI.showAlert("idAlert","IDs saved in session successfully.","success"); UI.fillText("custUserValue",userId.value||"Not set"); UI.fillText("custProfileValue",customerProfileId.value||"Not set"); UI.fillText("custAccountValue",primaryAccountId.value||"Not set");});
  document.getElementById("loadAccountsBtn").addEventListener("click",async()=>{
    const current=AppSession.getIds(); if(!current.customerProfileId){ UI.showAlert("pageAlert","Save Customer Profile ID first.","warning"); return; }
    UI.showLoader();
    try{
      const rows=await CustomerApi.accountsByCustomer(current.customerProfileId);
      const body=document.getElementById("accountsTableBody");
      body.innerHTML=(rows||[]).length? rows.map(a=>`<tr><td>${a.accountNumber||"—"}</td><td>${a.accountType||"—"}</td><td>${UI.currency(a.balance)}</td><td>${a.status||"—"}</td></tr>`).join("") : `<tr><td colspan="4" class="text-center text-muted py-4">No accounts found</td></tr>`;
    } catch(error){ UI.showAlert("pageAlert",error.message,"danger"); }
    finally{ UI.hideLoader(); }
  });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/session.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/ui.js"></script>
<script src="/assets/js/customer.js"></script>
</body>
</html>

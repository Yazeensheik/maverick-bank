<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>View Employees • Maverick Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/forms.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="app-main">
      <header id="navbar"></header>
      <main class="content-area">
        <div class="content-header">
          <div>
            <h2 class="mb-1">View Employee Profiles</h2>
            <p class="text-muted mb-0">Employee profile listing</p>
          </div>
        </div>
        <div id="globalAlert"></div>
        
<div class="panel-card">
  <div class="d-flex justify-content-between gap-2 mb-3 flex-wrap">
    <input type="text" class="form-control table-search" id="employeeSearch" placeholder="Search by name, email or department">
    <button class="btn btn-outline-primary" onclick="loadEmployeesTable()">Refresh</button>
  </div>
  <div class="table-responsive">
    <table class="table align-middle">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Department</th>
          <th>User ID</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="employeesTableBody"></tbody>
    </table>
  </div>
</div>
<script src="/assets/js/employee.js"></script>

      </main>
      <footer id="footer"></footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/services/userService.js"></script>
  <script src="/services/customerService.js"></script>
  <script src="/services/employeeService.js"></script>
</body>
</html>

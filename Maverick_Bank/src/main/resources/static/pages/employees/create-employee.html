<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Employee • Maverick Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/forms.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <div class="app-main">
      <header id="navbar"></header>
      <main class="content-area">
        <div class="content-header">
          <div>
            <h2 class="mb-1">Create Employee Profile</h2>
            <p class="text-muted mb-0">Create an employee profile linked to an existing user</p>
          </div>
        </div>
        <div id="globalAlert"></div>
        
<div class="panel-card form-card">
  <form id="createEmployeeForm" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" id="employeeFullName" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Department</label>
      <input type="text" class="form-control" id="employeeDepartment" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="employeeEmail" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Phone</label>
      <input type="text" class="form-control" id="employeePhone" pattern="^[0-9]{10}$" placeholder="10-digit mobile" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">User ID</label>
      <input type="number" class="form-control" id="employeeUserId" required>
    </div>
    <div class="col-12">
      <button class="btn btn-bank" type="submit">Create Employee Profile</button>
    </div>
  </form>
</div>
<script src="/assets/js/employee.js"></script>

      </main>
      <footer id="footer"></footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/services/userService.js"></script>
  <script src="/services/customerService.js"></script>
  <script src="/services/employeeService.js"></script>
</body>
</html>

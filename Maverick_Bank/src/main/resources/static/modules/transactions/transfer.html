<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer Money</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand mb-0 h1">Maverick Bank</span>

<a href="../../dashboards/transactions-dashboard.html" class="btn btn-secondary mb-3">← Back to Dashboard</a>

</div>
</nav>

<!-- PAGE -->
<div class="container mt-5">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4 class="mb-0">Transfer Money</h4>
</div>
<div class="card-body">
<form id="transferForm">

<div class="mb-3">
<label class="form-label">From Account ID</label>
<input type="number" class="form-control" id="fromAccountId" required>
</div>

<div class="mb-3">
<label class="form-label">To Account ID</label>
<input type="number" class="form-control" id="toAccountId" required>
</div>

<div class="mb-3">
<label class="form-label">Amount</label>
<input type="number" class="form-control" id="amount" required>
</div>

<button type="submit" class="btn btn-success w-100">Transfer Money</button>

</form>
</div>
</div>
</div>
<script src="../../js/controllers/transactionController.js"></script>
</body>
</html>

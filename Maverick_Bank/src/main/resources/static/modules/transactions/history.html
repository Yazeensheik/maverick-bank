<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction History</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand mb-0 h1">Maverick Bank</span>

<a href="../../dashboards/transactions-dashboard.html" class="btn btn-secondary mb-3">← Back to Dashboard</a>

</div>
</nav>

<!-- PAGE CONTENT -->
<div class="container mt-5">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4 class="mb-0">Transaction History</h4>
</div>

<div class="card-body">

<!-- ACCOUNT INPUT -->
<div class="row mb-4">
<div class="col-md-4">
<input type="number" id="accountId" class="form-control" placeholder="Enter Account ID">
</div>

<div class="col-md-2">
<button id="loadTransactions" class="btn btn-primary w-100">
Load Transactions
</button>
</div>

</div>

<!-- TRANSACTION TABLE -->
<table class="table table-striped table-hover">
<thead class="table-dark">

<tr>
<th>Transaction ID</th>
<th>Amount</th>
<th>Type</th>
<th>Account ID</th>
</tr>

</thead>

<tbody id="transactionTable"></tbody>
</table>

</div>

</div>

</div>

<script src="../../js/controllers/transactionController.js"></script>

</body>
</html>

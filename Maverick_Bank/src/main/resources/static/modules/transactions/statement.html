<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Statement</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand">Maverick Bank - Statement</span>

<a href="/modules/dashboard/transactions-dashboard.html" class="btn btn-secondary mb-3">← Back to Dashboard</a>

</div>
</nav>

<div class="container mt-4">

<div class="card p-4 shadow">

<h4>Generate Account Statement</h4>

<div class="row g-3">

<div class="col-md-4">
<label>Account ID</label>
<input type="number" id="statementAccountId" class="form-control">
</div>

<div class="col-md-4">
<label>Start Date</label>
<input type="datetime-local" id="startDate" class="form-control">
</div>

<div class="col-md-4">
<label>End Date</label>
<input type="datetime-local" id="endDate" class="form-control">
</div>

</div>

<button class="btn btn-primary mt-3" id="generateStatement">
Generate Statement
</button>

</div>

<div class="card mt-4 p-4 shadow">

<h4>Statement Result</h4>

<table class="table table-bordered mt-3">

<thead>
<tr>
<th>ID</th>
<th>Amount</th>
<th>Type</th>
<th>Date</th>
<th>Reference</th>
<th>Account</th>
</tr>
</thead>

<tbody id="statementTable"></tbody>

</table>

</div>

</div>

<script src="../../js/controllers/transactionController.js"></script>

</body>
</html>

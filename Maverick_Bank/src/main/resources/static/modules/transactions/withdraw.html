<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw Money</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand">Maverick Bank</span>

<a href="/modules/dashboard/transactions-dashboard.html" class="btn btn-secondary mb-3">← Back to Dashboard</a>

</div>
</nav>

<div class="container mt-5">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4>Withdraw Money</h4>
</div>

<div class="card-body">
<form id="withdrawForm">
<div class="mb-3">
<label class="form-label">Account ID</label>
<input type="number" class="form-control" id="withdrawAccountId" required>
</div>

<div class="mb-3">
<label class="form-label">Amount</label>
<input type="number" class="form-control" id="withdrawAmount" required>
</div>

<button type="submit" class="btn btn-success w-100">Withdraw</button>

</form>
</div>
</div>
</div>
<script src="../../js/controllers/transactionController.js"></script>

</body>
</html>

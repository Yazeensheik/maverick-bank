<!DOCTYPE html>
<html lang="en">

<head>

<title>Open Account • Maverick Bank</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="/assets/css/layout.css">
<link rel="stylesheet" href="/assets/css/forms.css">

</head>

<body>

	<div class="app-shell">

		<aside id="sidebar"></aside>

		<div class="app-main">

			<header id="navbar"></header>

			<main class="content-area">

				<div class="container" style="max-width: 600px;">

					<h3 class="mb-4">Open New Account</h3>

					<form id="openAccountForm">

						<div class="mb-3">
							<label class="form-label">Account Type</label> <select
								class="form-select" id="accountType">
								<option value="SAVINGS">Savings</option>
								<option value="CURRENT">Current</option>
							</select>
						</div>

						<div class="mb-3">
							<label class="form-label">Initial Balance</label> <input
								type="number" class="form-control" id="balance" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Status</label> <select
								class="form-select" id="status">
								<option value="ACTIVE">Active</option>
								<option value="INACTIVE">Inactive</option>
							</select>
						</div>

						<div class="mb-3">
							<label class="form-label">Customer Profile ID</label> <input
								type="number" class="form-control" id="customerProfileId"
								required>
						</div>

						<button type="submit" class="btn btn-primary w-100">Open
							Account</button>

					</form>

					<div id="message" class="mt-3"></div>

				</div>

			</main>

			<footer id="footer"></footer>

		</div>

	</div>

	<script src="../../js/services/accountService.js"></script>
	<script src="../../js/controllers/openAccountController.js"></script>

</body>
</html>

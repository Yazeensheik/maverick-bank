<!DOCTYPE html>
<html>

<head>
<title>Open Account</title>

<link rel="stylesheet" href="../../css/forms.css">

<link href="../../vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<div class="container mt-5">

		<h2>Open New Account</h2>

		<form id="openAccountForm">

			<div class="mb-3"></div>

			<div class="mb-3">
				<label class="form-label">Account Type</label> <select
					class="form-control" id="accountType">
					<option value="SAVINGS">Savings</option>
					<option value="CURRENT">Current</option>
				</select>
			</div>

			<div class="mb-3">
				<label class="form-label">Balance</label> <input type="number"
					class="form-control" id="balance" required>
			</div>

			<div class="mb-3">
				<label class="form-label">Status</label> <select
					class="form-control" id="status">
					<option value="ACTIVE">Active</option>
					<option value="INACTIVE">Inactive</option>
				</select>
			</div>

			<div class="mb-3">
				<label class="form-label">Customer Profile ID</label> <input
					type="number" class="form-control" id="customerProfileId" required>
			</div>

			<button type="submit" class="btn btn-primary">Open Account</button>

		</form>

		<div id="message" class="mt-3"></div>

	</div>

	<script src="../../js/services/accountService.js"></script>
	<script src="../../js/controllers/openAccountController.js"></script>

</body>
</html>

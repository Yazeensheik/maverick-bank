<!DOCTYPE html>
<html>

<head>
<title>Account List</title>

<link rel="stylesheet" href="../../css/dashboard.css">

<link href="../../vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<div class="container mt-5">

		<h2>My Accounts</h2>

		<div class="mb-3">
			<label class="form-label">Customer ID</label> <input type="number"
				id="customerId" class="form-control">
			<button class="btn btn-primary mt-2" onclick="loadAccounts()">
				Load Accounts</button>
		</div>

		<table class="table table-bordered">

			<thead>
				<tr>
					<th>Account ID</th>
					<th>Account Number</th>
					<th>Type</th>
					<th>Balance</th>
					<th>Status</th>
					<th>Action</th>
				</tr>
			</thead>

			<tbody id="accountTableBody">

			</tbody>

		</table>

	</div>

	<script src="../../js/services/accountService.js"></script>
	<script src="../../js/controllers/accountListController.js"></script>

</body>
</html>

<!doctype html>
<html lang="en">

<head>

<title>My Accounts • Maverick Bank</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/layout.css">
<link rel="stylesheet" href="/assets/css/forms.css">
<link rel="stylesheet" href="/assets/css/dashboard.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand mb-0 h1">Maverick Bank</span>

<a href="/modules/dashboard/account-dashboard.html" class="btn btn-secondary mb-3">← Back to Dashboard</a>

</div>
</nav>

<div class="app-shell">

<aside></aside>

<div class="app-main">

<header></header>

<main class="content-area">

<div class="content-header">
<div>
<h2 class="mb-1">My Accounts</h2>
<p class="text-muted mb-0">View and manage customer accounts</p>
</div>
</div>

<div id="globalAlert"></div>

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="panel-card">

<h5 class="mb-4">Search Customer Accounts</h5>

<div class="row g-3 align-items-end mb-4">

<div class="col-md-4">
<label class="form-label">Customer Profile ID</label>
<input type="number" id="customerId" class="form-control">
</div>

<div class="col-md-3">
<button class="btn btn-bank w-100" onclick="loadAccounts()">Load Accounts</button>
</div>

</div>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-light">

<tr>
<th>Account ID</th>
<th>Account Number</th>
<th>Account Type</th>
<th>Balance</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="accountTableBody"></tbody>

</table>

</div>

</div>

</div>

</div>

</main>

<footer id="footer"></footer>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

try {

const navbar = document.getElementById("navbar");
const sidebar = document.getElementById("sidebar");
const footer = document.getElementById("footer");

if (navbar) {
const res = await fetch("/components/navbar.html");
navbar.innerHTML = await res.text();
}

if (sidebar) {
const res = await fetch("/components/sidebar.html");
sidebar.innerHTML = await res.text();
}

if (footer) {
const res = await fetch("/components/footer.html");
footer.innerHTML = await res.text();
}

} catch (e) {
console.error("Layout load failed", e);
}

});
</script>

<script src="/js/services/accountService.js"></script>
<script src="/js/controllers/accountListController.js"></script>

</body>
</html>

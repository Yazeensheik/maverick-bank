<!DOCTYPE html>
<html lang="en">

<head>

<title>My Accounts • Maverick Bank</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="/assets/css/layout.css">
<link rel="stylesheet" href="/assets/css/dashboard.css">

</head>

<body>

	<div class="app-shell">

		<aside id="sidebar"></aside>

		<div class="app-main">

			<header id="navbar"></header>

			<main class="content-area">

				<div class="content-header">
					<h2>My Accounts</h2>
					<p class="text-muted">View and manage your accounts</p>
				</div>

				<div class="card p-4 shadow-sm">

					<div class="mb-3">
						<label class="form-label">Customer ID</label> <input type="number"
							id="customerId" class="form-control">
						<button class="btn btn-primary mt-2" onclick="loadAccounts()">Load
							Accounts</button>
					</div>

					<table class="table table-bordered">

						<thead>
							<tr>
								<th>Account ID</th>
								<th>Account Number</th>
								<th>Type</th>
								<th>Balance</th>
								<th>Status</th>
								<th>Action</th>
							</tr>
						</thead>

						<tbody id="accountTableBody"></tbody>

					</table>

				</div>

			</main>

			<footer id="footer"></footer>

		</div>

	</div>

	<script src="../../js/services/accountService.js"></script>
	<script src="../../js/controllers/accountListController.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/dashboard.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Customer Dashboard</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card shadow text-center">
<div class="card-body">
<h5 class="card-title">Open Account</h5>
<p>Create a new bank account</p>
<a href="/modules/accounts/open-account.html" class="btn btn-primary">Open</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow text-center">
<div class="card-body">
<h5 class="card-title">View Accounts</h5>
<p>Check all your accounts</p>
<a href="/modules/accounts/account-list.html" class="btn btn-primary">View</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow text-center">
<div class="card-body">
<h5 class="card-title">Add Beneficiary</h5>
<p>Add beneficiary for transfers</p>
<a href="/modules/beneficiaries/add-beneficiary.html" class="btn btn-primary">Add</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow text-center">
<div class="card-body">
<h5 class="card-title">Apply Loan</h5>
<p>Apply for a new loan</p>
<a href="/modules/loans/apply-loan.html" class="btn btn-success">Apply</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow text-center">
<div class="card-body">
<h5 class="card-title">View Loans</h5>
<p>Check your loan applications</p>
<a href="/modules/loans/loan-list.html" class="btn btn-success">View</a>
</div>
</div>
</div>

</div>

</div>
<script src="/js/controllers/customerDashboardController.js"></script>
</body>
</html>

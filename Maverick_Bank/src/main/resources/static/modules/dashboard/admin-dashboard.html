<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard • Maverick Bank</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/forms.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">

</head>

<body>

<div class="app-shell">

  <aside id="sidebar"></aside>

  <div class="app-main">

    <header id="navbar"></header>

    <main class="content-area">

      <div class="content-header">
        <div>
          <h2 class="mb-1">Dashboard</h2>
          <p class="text-muted mb-0">Quick overview of banking admin records</p>
        </div>
      </div>

      <div id="globalAlert"></div>

      <!-- STAT CARDS -->

      <div class="row g-4 mb-4">

        <div class="col-md-4">
          <div class="stat-card">
            <p>Total Users</p>
            <h3 id="usersCount">0</h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="stat-card">
            <p>Total Customers</p>
            <h3 id="customersCount">0</h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="stat-card">
            <p>Total Employees</p>
            <h3 id="employeesCount">0</h3>
          </div>
        </div>

      </div>

      <!-- TABLE + QUICK ACTIONS -->

      <div class="row g-4">

        <!-- RECENT USERS -->

        <div class="col-lg-7">

          <div class="panel-card">

            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="mb-0">Recent Users</h5>
              <a class="btn btn-sm btn-outline-primary" href="/pages/users/view-users.html">View all</a>
            </div>

            <div class="table-responsive">

              <table class="table align-middle mb-0">

                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Status</th>
                  </tr>
                </thead>

                <tbody id="recentUsersBody"></tbody>

              </table>

            </div>

          </div>

        </div>


        <!-- QUICK ACTIONS -->

        <div class="col-lg-5">

          <div class="panel-card h-100">

            <h5 class="mb-3">Quick Actions</h5>

            <div class="d-grid gap-2">

              <a class="btn btn-bank" href="/pages/users/create-user.html">
                Create User
              </a>

              <a class="btn btn-outline-primary" href="/pages/customers/create-customer.html">
                Create Customer Profile
              </a>

              <a class="btn btn-outline-primary" href="/pages/employees/create-employee.html">
                Create Employee Profile
              </a>

              <!-- LOAN BUTTON ADDED -->

              <a class="btn btn-outline-primary" href="/modules/loan/loans.html">
                Manage Loans
              </a>

            </div>

          </div>

        </div>

      </div>

    </main>

    <footer id="footer"></footer>

  </div>

</div>


<!-- JS -->

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/auth.js"></script>

<script src="/services/userService.js"></script>
<script src="/services/customerService.js"></script>
<script src="/services/employeeService.js"></script>


<script>

document.addEventListener("DOMContentLoaded", async function () {

  const navbar = document.getElementById("navbar");
  const sidebar = document.getElementById("sidebar");
  const footer = document.getElementById("footer");

  if (navbar) {
    const res = await fetch("/components/navbar.html");
    navbar.innerHTML = await res.text();
  }

  if (sidebar) {
    const res = await fetch("/components/sidebar.html");
    sidebar.innerHTML = await res.text();
  }

  if (footer) {
    const res = await fetch("/components/footer.html");
    footer.innerHTML = await res.text();
  }

});

</script>

<script src="/assets/js/dashboard.js"></script>

</body>
</html>

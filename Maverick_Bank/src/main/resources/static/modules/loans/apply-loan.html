<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Loan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Apply for Loan</h2>

<div class="card shadow p-4">

<form id="loanForm">

<div class="mb-3">
<label class="form-label">Customer ID</label>
<input type="number" class="form-control" id="customerId" required>
</div>

<div class="mb-3">
<label class="form-label">Loan ID</label>
<input type="number" class="form-control" id="loanId" required>
</div>

<div class="mb-3">
<label class="form-label">Amount</label>
<input type="number" class="form-control" id="amount" required>
</div>

<div class="mb-3">
<label class="form-label">Purpose</label>
<input type="text" class="form-control" id="purpose" required>
</div>

<button type="submit" class="btn btn-primary">Apply Loan</button>

</form>

</div>

</div>

<script>

document.getElementById("loanForm").addEventListener("submit", async function(e){

e.preventDefault();

const data = {

customerId: document.getElementById("customerId").value,
loanId: document.getElementById("loanId").value,
amount: document.getElementById("amount").value,
purpose: document.getElementById("purpose").value

};

const response = await fetch("/api/loan-applications",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

});

if(response.ok){

alert("Loan Application Submitted Successfully");

document.getElementById("loanForm").reset();

}else{

alert("Error submitting loan application");

}

});

</script>

</body>
</html>

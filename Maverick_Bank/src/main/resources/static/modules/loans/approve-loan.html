<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve Loan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Loan Approval</h2>

<div class="card shadow p-4">

<div class="mb-3">
<label class="form-label">Loan Application ID</label>
<input type="number" class="form-control" id="applicationId" required>
</div>

<div class="d-flex gap-3">

<button class="btn btn-success" onclick="approveLoan()">
Approve Loan
</button>

<button class="btn btn-danger" onclick="rejectLoan()">
Reject Loan
</button>

</div>

</div>

</div>

<script>

async function approveLoan(){

const id = document.getElementById("applicationId").value;

const response = await fetch("/api/loan-applications/" + id + "/approve",{
method:"PUT"
});

if(response.ok){

alert("Loan Approved Successfully");

}else{

alert("Error approving loan");

}

}

async function rejectLoan(){

const id = document.getElementById("applicationId").value;

const response = await fetch("/api/loan-applications/" + id + "/reject",{
method:"PUT"
});

if(response.ok){

alert("Loan Rejected Successfully");

}else{

alert("Error rejecting loan");

}

}

</script>

</body>
</html>

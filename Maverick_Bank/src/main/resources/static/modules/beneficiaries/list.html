<!doctype html>
<html lang="en">
<head>
<title>Beneficiaries • Maverick Bank</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/assets/css/layout.css">
<link rel="stylesheet" href="/assets/css/forms.css">
<link rel="stylesheet" href="/assets/css/dashboard.css">

</head>

<body>


<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand mb-0 h1">Maverick Bank</span>

<a href="/modules/dashboard/account-dashboard.html" class="btn btn-secondary mb-3">← Back to Dashboard</a>

</div>
</nav>

  <div class="app-shell">
    <aside ></aside>


<div class="app-shell">

<aside id="sidebar"></aside>

<div class="app-main">

<header id="navbar"></header>

<main class="content-area">

<div class="content-header">
<div>
<h2 class="mb-1">Beneficiaries</h2>
<p class="text-muted mb-0">Manage beneficiary accounts</p>
</div>
</div>

<div id="globalAlert"></div>

<div class="row justify-content-center">
<div class="col-lg-11">

<div class="panel-card">

<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
<h5 class="mb-0">Beneficiary List</h5>

<button class="btn btn-bank" onclick="loadBeneficiaries()">
Load Beneficiaries
</button>

</div>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-light">

<tr>
<th>ID</th>
<th>Name</th>
<th>Account Number</th>
<th>Bank</th>
<th>Branch</th>
<th>IFSC</th>
<th>Account ID</th>
<th>Action</th>
</tr>

</thead>

<tbody id="beneficiaryTableBody"></tbody>

</table>

</div>

<div id="message" class="mt-3"></div>

</div>

</div>
</div>

</main>

<footer id="footer"></footer>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>

<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

try {

const navbar = document.getElementById("navbar");
const sidebar = document.getElementById("sidebar");
const footer = document.getElementById("footer");

if (navbar) {
const res = await fetch("/components/navbar.html");
navbar.innerHTML = await res.text();
}

if (sidebar) {
const res = await fetch("/components/sidebar.html");
sidebar.innerHTML = await res.text();
}

if (footer) {
const res = await fetch("/components/footer.html");
footer.innerHTML = await res.text();
}

} catch (e) {
console.error("Layout load failed", e);
}

});
</script>

<script src="/js/services/beneficiaryService.js"></script>
<script src="/js/controllers/beneficiaryListController.js"></script>

</body>
</html>

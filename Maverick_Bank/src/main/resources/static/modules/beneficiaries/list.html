<!DOCTYPE html>
<html lang="en">

<head>

<title>Beneficiaries • Maverick Bank</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="/assets/css/layout.css">
<link rel="stylesheet" href="/assets/css/dashboard.css">

</head>

<body>

	<div class="app-shell">

		<aside id="sidebar"></aside>

		<div class="app-main">

			<header id="navbar"></header>

			<main class="content-area">

				<div class="content-header">
					<h2>Beneficiaries</h2>
					<p class="text-muted">Manage beneficiary accounts</p>
				</div>

				<div class="card p-4 shadow-sm">

					<button class="btn btn-primary mb-3" onclick="loadBeneficiaries()">Load
						Beneficiaries</button>

					<table class="table table-bordered">

						<thead>
							<tr>
								<th>ID</th>
								<th>Name</th>
								<th>Account Number</th>
								<th>Bank</th>
								<th>Branch</th>
								<th>IFSC</th>
								<th>Account ID</th>
								<th>Action</th>
							</tr>
						</thead>

						<tbody id="beneficiaryTableBody"></tbody>

					</table>

				</div>

			</main>

			<footer id="footer"></footer>

		</div>

	</div>

	<script src="../../js/services/beneficiaryService.js"></script>
	<script src="../../js/controllers/beneficiaryListController.js"></script>

</body>
</html>

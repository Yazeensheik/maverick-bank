<!DOCTYPE html>
<html lang="en">

<head>

<title>Add Beneficiary • Maverick Bank</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="/assets/css/layout.css">
<link rel="stylesheet" href="/assets/css/forms.css">

</head>

<body>

	<div class="app-shell">

		<aside id="sidebar"></aside>

		<div class="app-main">

			<header id="navbar"></header>

			<main class="content-area">

				<div class="content-header">
					<h2>Add Beneficiary</h2>
					<p class="text-muted">Add a new beneficiary account</p>
				</div>

				<div class="card p-4 shadow-sm">

					<form id="beneficiaryForm">

						<div class="mb-3">
							<label class="form-label">Beneficiary Name</label> <input
								type="text" class="form-control" id="beneficiaryName" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Account Number</label> <input
								type="text" class="form-control" id="accountNumber" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Bank Name</label> <input type="text"
								class="form-control" id="bankName" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Branch Name</label> <input type="text"
								class="form-control" id="branchName" required>
						</div>

						<div class="mb-3">
							<label class="form-label">IFSC Code</label> <input type="text"
								class="form-control" id="ifscCode" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Account ID</label> <input type="number"
								class="form-control" id="accountId" required>
						</div>

						<button class="btn btn-primary" type="submit">Add
							Beneficiary</button>

					</form>

					<div id="message" class="mt-3"></div>

				</div>

			</main>

			<footer id="footer"></footer>

		</div>

	</div>

	<script src="../../js/services/beneficiaryService.js"></script>
	<script src="../../js/controllers/addBeneficiaryController.js"></script>

</body>
</html>

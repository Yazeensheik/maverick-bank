<!doctype html>
<html lang="en">
<head>
  <title>Add Beneficiary • Maverick Bank</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/forms.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>

    <div class="app-main">
      <header id="navbar"></header>

      <main class="content-area">
        <div class="content-header">
          <div>
            <h2 class="mb-1">Add Beneficiary</h2>
            <p class="text-muted mb-0">Add a new beneficiary account</p>
          </div>
        </div>

        <div id="globalAlert"></div>

        <div class="row justify-content-center">
          <div class="col-lg-7 col-xl-6">
            <div class="panel-card">
              <h5 class="mb-4">Beneficiary Details</h5>

              <form id="beneficiaryForm">
                <div class="mb-3">
                  <label for="beneficiaryName" class="form-label">Beneficiary Name</label>
                  <input type="text" class="form-control" id="beneficiaryName" required>
                </div>

                <div class="mb-3">
                  <label for="accountNumber" class="form-label">Account Number</label>
                  <input type="text" class="form-control" id="accountNumber" required>
                </div>

                <div class="mb-3">
                  <label for="bankName" class="form-label">Bank Name</label>
                  <input type="text" class="form-control" id="bankName" required>
                </div>

                <div class="mb-3">
                  <label for="branchName" class="form-label">Branch Name</label>
                  <input type="text" class="form-control" id="branchName" required>
                </div>

                <div class="mb-3">
                  <label for="ifscCode" class="form-label">IFSC Code</label>
                  <input type="text" class="form-control" id="ifscCode" required>
                </div>

                <div class="mb-4">
                  <label for="accountId" class="form-label">Account ID</label>
                  <input type="number" class="form-control" id="accountId" required>
                </div>

                <div class="d-grid">
                  <button class="btn btn-bank" type="submit">Add Beneficiary</button>
                </div>
              </form>

              <div id="message" class="mt-3"></div>
            </div>
          </div>
        </div>
      </main>

      <footer id="footer"></footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async function () {
      try {
        const navbar = document.getElementById("navbar");
        const sidebar = document.getElementById("sidebar");
        const footer = document.getElementById("footer");

        if (navbar) {
          const res = await fetch("/components/navbar.html");
          navbar.innerHTML = await res.text();
        }

        if (sidebar) {
          const res = await fetch("/components/sidebar.html");
          sidebar.innerHTML = await res.text();
        }

        if (footer) {
          const res = await fetch("/components/footer.html");
          footer.innerHTML = await res.text();
        }
      } catch (e) {
        console.error("Layout load failed", e);
      }
    });
  </script>

  <script src="/js/services/beneficiaryService.js"></script>
  <script src="/js/controllers/addBeneficiaryController.js"></script>
</body>
</html>

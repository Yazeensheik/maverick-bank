<!DOCTYPE html>
<html>

<head>

<title>Loan Applications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<span class="navbar-brand fs-4 fw-bold">
<i class="bi bi-bank2"></i> Maverick Bank</span>
<a href="/modules/dashboard/customer-dashboard.html" class="btn btn-secondary mb-3"> ← Back to Dashboard</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4 text-center">Loan Application Dashboard</h2>


<h3>Available Loans</h3>

<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Loan Type</th>
<th>Interest Rate</th>
<th>Apply</th>
</tr>
</thead>

<tbody id="loanList"></tbody>

</table>

<div class="row">

<!-- APPLY LOAN -->
<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h4>Apply Loan</h4>

<div class="mb-3">
<label class="form-label">Loan ID</label>
<input type="text" id="loanId" class="form-control" readonly>
</div>

<div class="mb-3">
<label class="form-label">Amount</label>
<input type="number" id="amount" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Purpose</label>
<input type="text" id="purpose" class="form-control">
</div>

<button class="btn btn-primary" onclick="applyLoan()">Apply Loan</button>

<p class="mt-3 text-success" id="applyMessage"></p>

</div>
</div>

</div>


<!-- SEARCH LOAN -->
<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-dark text-white">
View Loan Application
</div>

<div class="card-body">

<div class="mb-3">
<label class="form-label">Application ID</label>
<input type="number" class="form-control" id="searchId">
</div>

<button class="btn btn-primary w-100" onclick="getLoan()">
Search Loan
</button>

</div>

</div>

</div>

</div>

<!-- TABLE -->

<div class="card shadow mt-5">

<div class="card-header bg-secondary text-white">
Loan Application Details
</div>

<div class="card-body">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>Loan Type</th>
<th>Amount</th>
<th>Purpose</th>
<th>Status</th>
</tr>

</thead>

<tbody id="loanTable"></tbody>

</table>

</div>

</div>

</div>

<script src="loanDashboard.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Loan Applications • Maverick Bank</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/forms.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>

  <div class="app-shell">
    <aside ></aside>

    <div class="app-main">
      <header ></header>

      <main class="content-area">
        <div class="content-header">
          <div>
            <h2 class="mb-1">Loan Application Dashboard</h2>
            <p class="text-muted mb-0">Apply and manage loan applications</p>
          </div>
        </div>

        <div id="globalAlert"></div>

       <div class="panel-card mb-4">
          <h5 class="mb-3">Available Loans</h5>

          <div class="table-responsive">
            <table class="table table-bordered align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Loan Type</th>
                  <th>Interest Rate</th>
                  <th>Apply</th>
                </tr>
              </thead>
              <tbody id="loanList"></tbody>
            </table>
          </div>
        </div> 

        <div class="row g-4">
          <div class="col-md-6">
            <div class="panel-card h-100">
              <h5 class="mb-3">Apply Loan</h5>

              <div class="mb-3">
                <label for="loanId" class="form-label">Loan ID</label>
                <input type="text" id="loanId" class="form-control" readonly>
              </div>

              <div class="mb-3">
                <label for="amount" class="form-label">Amount</label>
                <input type="number" id="amount" class="form-control">
              </div>

              <div class="mb-3">
                <label for="purpose" class="form-label">Purpose</label>
                <input type="text" id="purpose" class="form-control">
              </div>

              <button class="btn btn-bank" onclick="applyLoan()">Apply Loan</button>

              <p class="mt-3 text-success mb-0" id="applyMessage"></p>
            </div>
          </div>

          <div class="col-md-6">
            <div class="panel-card h-100">
              <h5 class="mb-3">View Loan Application</h5>

              <div class="mb-3">
                <label for="searchId" class="form-label">Application ID</label>
                <input type="number" class="form-control" id="searchId">
              </div>

              <button class="btn btn-bank w-100" onclick="getLoan()">Search Loan</button>
            </div>
          </div>
        </div>

        <div class="panel-card mt-4">
          <h5 class="mb-3">Loan Application Details</h5>

          <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th>Loan Type</th>
                  <th>Amount</th>
                  <th>Purpose</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="loanTable"></tbody>
            </table>
          </div>
        </div>
      </main>

      <footer id="footer"></footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>

  
  <script src="/modules/loan/loanDashboard.js"></script>
</body>
</html>

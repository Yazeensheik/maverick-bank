<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apply Loan</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
<div class="container">
<span class="navbar-brand fs-4 fw-bold">
<i class="bi bi-bank2"></i> Maverick Bank</span>
<a href="/modules/dashboard/customer-dashboard.html" class="btn btn-secondary mb-3"> <- Back to Dashboard</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4 text-center">Loan Application</h2>


<h3>Available Loans</h3>

<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Loan Type</th>
<th>Interest Rate</th>
<th>Apply</th>
</tr>
</thead>

<tbody id="loanList"></tbody>

</table>
<!-- APPLY LOAN -->
<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h4>Apply Loan</h4>

<div class="mb-3">
<label class="form-label">Loan ID</label>
<input type="text" id="loanId" class="form-control" readonly>
</div>

<div class="mb-3">
<label class="form-label">Amount</label>
<input type="number" id="amount" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Purpose</label>
<input type="text" id="purpose" class="form-control">
</div>

<button class="btn btn-primary" onclick="applyLoan()">Apply Loan</button>

<p class="mt-3 text-success" id="applyMessage"></p>

</div>
</div>

</div>
</div>
<script src="loanDashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Employee Loan Applications • Maverick Bank</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/forms.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>

  <div class="app-shell">

    <aside id="sidebar">
      <div class="sidebar p-3">

        <h4 class="fw-bold text-white mb-4">
          Maverick Bank
        </h4>

        <ul class="nav flex-column">
          <li class="nav-item mb-2">
            <a class="nav-link" href="/modules/dashboard/employee-dashboard.html">Dashboard</a>
          </li>

          <li class="nav-item mb-2">
            <a class="nav-link" href="/modules/accounts/account-list.html">View Accounts</a>
          </li>

          <li class="nav-item mb-2">
            <a class="nav-link" href="/modules/dashboard/transactions-dashboard.html">Transactions</a>
          </li>

          <li class="nav-item mb-2">
            <a class="nav-link" href="/modules/loan/employee-loans.html">Loans</a>
          </li>

          <li class="nav-item mt-3">
            <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
          </li>
        </ul>

      </div>
    </aside>

    <div class="app-main">

      <header id="navbar"></header>

      <main class="content-area">

        <div class="content-header">
          <div>
            <h2 class="mb-1">Loan Applications</h2>
            <p class="text-muted mb-0">View and manage customer loan requests</p>
          </div>
        </div>

        <div id="globalAlert"></div>

        <div class="panel-card">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h5 class="mb-0">Employee Loan Requests</h5>
            <button class="btn btn-bank" onclick="loadLoanApplications()">Load Applications</button>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th>Application ID</th>
                  <th>Loan ID</th>
                  <th>Amount</th>
                  <th>Purpose</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="loanApplications"></tbody>
            </table>
          </div>
        </div>

      </main>

      <footer id="footer"></footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async function () {
      try {
        const navbar = document.getElementById("navbar");
        const footer = document.getElementById("footer");

        if (navbar) {
          const res = await fetch("/components/navbar.html");
          navbar.innerHTML = await res.text();
        }

        if (footer) {
          const res = await fetch("/components/footer.html");
          footer.innerHTML = await res.text();
        }
      } catch (e) {
        console.error("Layout load failed", e);
      }
    });
  </script>

  <script src="/modules/loan/employeeLoans.js"></script>
</body>
</html>

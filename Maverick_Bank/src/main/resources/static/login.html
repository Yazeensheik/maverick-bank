<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login • Maverick Bank</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body class="auth-body">
  <div class="auth-grid">
    <div class="auth-left d-none d-lg-flex">
      <div>
        <span class="eyebrow text-white-50">Maverick Bank</span>
        <h1 class="display-5 fw-semibold text-white mt-3">Professional banking dashboard with a cleaner frontend flow.</h1>
        <p class="text-white-50 mt-3 mb-4">Login once, store the authenticated user, and move directly to the correct role-based dashboard.</p>
        <div class="auth-badges">
          <span>Admin</span>
          <span>Employee</span>
          <span>Customer</span>
        </div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-card shadow-lg">
        <a href="/index.html" class="text-decoration-none d-inline-flex align-items-center gap-2 mb-4 text-dark">
          <span class="brand-logo">MB</span>
          <strong>Maverick Bank</strong>
        </a>
        <h2 class="mb-1">Welcome back</h2>
        <p class="text-muted mb-4">Sign in to continue</p>
        <div id="authAlert"></div>
        <form id="loginForm" class="row g-3">
          <div class="col-12">
            <label class="form-label">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="username" class="form-control" placeholder="admin@maverickbank.com" required>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" class="form-control" placeholder="Enter password" required>
              <button type="button" class="btn btn-outline-secondary" id="togglePassword"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <div class="col-12 d-grid mt-2">
            <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">Login</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>
</body>
</html>

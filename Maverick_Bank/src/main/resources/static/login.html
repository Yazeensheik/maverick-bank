<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login • Maverick Bank</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/forms.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="login-page">
  <div class="login-bg-shape shape-1"></div>
  <div class="login-bg-shape shape-2"></div>
  <div class="login-bg-shape shape-3"></div>

  <div class="login-shell">
    <div class="login-card card border-0 shadow-lg overflow-hidden">
      <div class="row g-0 h-100">

        <div class="col-lg-6 d-none d-lg-flex login-left-panel">
          <div class="login-left-content">
            <div class="brand-mark mb-4">MB</div>
            <h1 class="login-bank-title">Maverick Bank</h1>
            <p class="login-bank-tagline">
              Secure. Smart. Reliable banking solutions for every customer.
            </p>

            <div class="feature-list mt-4">
              <div class="feature-item">
                <i class="bi bi-shield-check"></i>
                <span>Secure account access</span>
              </div>
              <div class="feature-item">
                <i class="bi bi-graph-up-arrow"></i>
                <span>Fast financial management</span>
              </div>
              <div class="feature-item">
                <i class="bi bi-people"></i>
                <span>Customer-focused banking</span>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card-body login-form-wrap p-4 p-md-5">
            <div class="text-center d-lg-none mb-4">
              <div class="brand-mark mx-auto mb-3">MB</div>
              <h1 class="h3 mb-1 fw-bold">Maverick Bank</h1>
            </div>

            <div class="login-header mb-4">
              <h2 class="login-title">Welcome</h2>
              <p class="login-subtitle mb-0">Sign in to continue to your dashboard</p>
            </div>

            <div id="loginAlert"></div>

            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="username" class="form-label">Email</label>
                <div class="input-group custom-input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input
                    type="email"
                    class="form-control"
                    id="username"
                    placeholder="admin@maverickbank.com"
                    required
                  >
                </div>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group custom-input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Enter password"
                    required
                  >
                  <button class="btn toggle-password-btn" type="button" id="togglePassword">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-4 login-options">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe">
                  <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="forgot-link">Forgot password?</a>
              </div>

              <button class="btn btn-bank w-100 py-2" type="submit" id="loginBtn">
                <span class="btn-text">Login</span>
              </button>
              
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/auth.js"></script>

  <script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener("click", function () {
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);

        const icon = this.querySelector("i");
        if (type === "text") {
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      });
    }
  </script>
</body>
</html>

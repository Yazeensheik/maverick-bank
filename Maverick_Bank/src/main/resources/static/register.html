<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Register • Maverick Bank</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="/assets/css/layout.css">
<link rel="stylesheet" href="/assets/css/forms.css">

</head>

<body class="login-page">

	<div class="login-shell">
		<div class="login-card card border-0 shadow-lg">

			<div class="card-body p-4 p-md-5">

				<div class="text-center mb-4">
					<div class="brand-mark mx-auto mb-3">MB</div>
					<h1 class="h3 mb-1">Maverick Bank</h1>
					<p class="text-muted">Create your account</p>
				</div>

				<div id="message"></div>

				<form id="registerForm" novalidate>

					<div class="mb-3">
						<label class="form-label">Email</label> <input type="email"
							class="form-control" id="email" placeholder="Enter email"
							required>
					</div>

					<div class="mb-3">
						<label class="form-label">Password</label> <input type="password"
							class="form-control" id="password" placeholder="Enter password"
							required>
					</div>

					<div class="mb-4">
						<label class="form-label">Role</label> <select
							class="form-control" id="role" required>
							<option value="">Select Role</option>
							<option value="CUSTOMER">Customer</option>
							<option value="EMPLOYEE">Employee</option>
						</select>
					</div>

					<button class="btn btn-bank w-100 py-2" type="submit">
						Register</button>

				</form>

			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>

	<script src="/js/controllers/registerController.js"></script>

</body>
</html>

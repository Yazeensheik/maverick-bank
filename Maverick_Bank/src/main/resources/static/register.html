<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register • Maverick Bank</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0b2a5b, #174a9c 55%, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.25;
    }

    body::before {
      width: 260px;
      height: 260px;
      background: #60a5fa;
      top: -70px;
      left: -70px;
    }

    body::after {
      width: 320px;
      height: 320px;
      background: #1d4ed8;
      bottom: -100px;
      right: -80px;
    }

    .register-shell {
      width: 100%;
      max-width: 430px;
      position: relative;
      z-index: 2;
    }

    .register-card {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 34px 30px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
      color: #fff;
    }

    .brand-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-mark {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, #ffffff, #dbeafe);
      color: #174a9c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.18);
    }

    .brand-wrap h1 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: 0.4px;
    }

    .brand-wrap p {
      color: rgba(255, 255, 255, 0.82);
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #f8fbff;
    }

    .form-control,
    .form-select {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.20);
      outline: none;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
      transition: 0.25s ease;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147, 197, 253, 0.2);
      transform: translateY(-1px);
    }

    .form-select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #1d4ed8 50%),
                        linear-gradient(135deg, #1d4ed8 50%, transparent 50%);
      background-position: calc(100% - 18px) calc(50% - 3px),
                           calc(100% - 12px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .btn-register {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      background: linear-gradient(135deg, #ffffff, #dbeafe);
      color: #174a9c;
      transition: 0.25s ease;
      margin-top: 8px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.22);
    }

    .btn-register:active {
      transform: translateY(0);
    }

    .message-box {
      min-height: 24px;
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      padding: 8px 10px;
      border-radius: 10px;
    }

    .message-success {
      background: rgba(34, 197, 94, 0.16);
      color: #dcfce7;
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .message-error {
      background: rgba(239, 68, 68, 0.16);
      color: #fee2e2;
      border: 1px solid rgba(239, 68, 68, 0.35);
    }

    .login-link {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.86);
    }

    .login-link a {
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .register-card {
        padding: 28px 20px;
        border-radius: 20px;
      }

      .brand-wrap h1 {
        font-size: 26px;
      }

      .brand-mark {
        width: 66px;
        height: 66px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="register-shell">
    <div class="register-card">
      <div class="brand-wrap">
        <div class="brand-mark">MB</div>
        <h1>Maverick Bank</h1>
        <p>Create your account</p>
      </div>

      <div id="message" class="message-box"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control" id="email" placeholder="Enter email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter password" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="role">Role</label>
          <select class="form-select" id="role" required>
            <option value="">Select Role</option>
            <option value="CUSTOMER">Customer</option>
            <option value="EMPLOYEE">Employee</option>
          </select>
        </div>

        <button class="btn-register" type="submit">Register</button>
      </form>

      <div class="login-link">
        Already have an account? <a href="/login.html">Login</a>
      </div>
    </div>
  </div>

  <script>
    const registerForm = document.getElementById("registerForm");
    const messageBox = document.getElementById("message");

    function showMessage(text, type) {
      messageBox.innerText = text;
      messageBox.className = "message-box " + (type === "success" ? "message-success" : "message-error");
    }

    registerForm.addEventListener("submit", function (e) {
      e.preventDefault();

      let email = document.getElementById("email").value.trim();
      let password = document.getElementById("password").value.trim();
      let role = document.getElementById("role").value;

      let url = "";

      if (!email || !password) {
        showMessage("Please fill all fields", "error");
        return;
      }

      if (role === "CUSTOMER") {
        url = "/api/users/add/customer";
      } else if (role === "EMPLOYEE") {
        url = "/api/users/add/employee";
      } else {
        showMessage("Please select a role", "error");
        return;
      }

      fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error("Registration failed");
        }
        return response.text();
      })
      .then(data => {
        showMessage("Registration successful!", "success");
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1500);
      })
      .catch(error => {
        console.error(error);
        showMessage("Registration failed", "error");
      });
    });
  </script>

</body>
</html>

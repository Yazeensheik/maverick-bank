<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register • Maverick Banking System</title>
  <link rel="icon" href="/assets/img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
<div id="loader" class="loader-overlay"><div class="spinner-border text-light" role="status"></div></div>
<div class="auth-cover d-flex align-items-center" style="background-image:url('/assets/img/register-bg.png')">
  <div class="container py-5">
    <div class="row justify-content-center justify-content-lg-between align-items-center g-4">
      <div class="col-lg-6 text-white">
        <a href="/index.html" class="text-white text-decoration-none fw-bold d-inline-flex align-items-center gap-2 mb-4"><img src="/assets/img/logo.png" alt="logo" style="height:42px"> Maverick Banking System</a>
        <h1 class="display-5 fw-bold">Admin-assisted user registration</h1>
        <p class="lead text-white-50">Your backend does not expose a public customer signup endpoint. This page therefore creates users only when an admin is already logged in.</p>
      </div>
      <div class="col-lg-5">
        <div class="auth-panel glass-card p-4 p-lg-5 mx-auto">
          <h2 class="fw-bold mb-1">Create User</h2>
          <p class="text-muted-2 mb-4">Requires an active admin session.</p>
          <div id="registerAlert"></div>
          <form id="registerForm" class="row g-3">
            <div class="col-12"><label class="form-label">User Type</label><select class="form-select" id="registerRole"><option value="CUSTOMER">Customer</option><option value="EMPLOYEE">Employee</option></select></div>
            <div class="col-12"><label class="form-label">Email</label><input class="form-control" id="registerEmail" required></div>
            <div class="col-12"><label class="form-label">Password</label><input class="form-control" id="registerPassword" type="password" required></div>
            <div class="col-12"><button class="btn btn-gradient rounded-pill w-100 py-3" type="submit">Create Backend User</button></div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("registerForm").addEventListener("submit",async(e)=>{
    e.preventDefault(); UI.clearAlert("registerAlert");
    const email=document.getElementById("registerEmail").value.trim();
    const password=document.getElementById("registerPassword").value;
    const role=document.getElementById("registerRole").value;
    if(!Validators.email(email)){ UI.showAlert("registerAlert","Please enter a valid email address.","warning"); return; }
    if(!Validators.password(password)){ UI.showAlert("registerAlert","Password must have uppercase, lowercase and a number, with at least 6 characters.","warning"); return; }
    UI.showLoader();
    try {
      if(AppSession.getCredentials().role!=="ADMIN") throw new Error("Admin login required before using registration.");
      const payload={email,password};
      const response= role==="EMPLOYEE" ? await AdminApi.createEmployeeUser(payload) : await AdminApi.createCustomerUser(payload);
      UI.showAlert("registerAlert",`User created successfully.`,"success");
      e.target.reset();
    } catch(error){ UI.showAlert("registerAlert",error.message,"danger"); }
    finally{ UI.hideLoader(); }
  });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/session.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/ui.js"></script>
<script src="/assets/js/validators.js"></script>
<script src="/assets/js/admin.js"></script>
</body>
</html>
